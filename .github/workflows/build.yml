name: Build RehabCenterApp

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore RehabCenterApp.csproj

    - name: Build
      run: dotnet build RehabCenterApp.csproj --no-restore --configuration Release

    - name: Publish Single-File
      run: dotnet publish RehabCenterApp.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RehabCenterApp-Executable
        path: bin/Release/net8.0/win-x64/publish/

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Build Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Installer\RehabCenterApp.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: RehabCenterApp-Installer
        path: Publish/*.exe
